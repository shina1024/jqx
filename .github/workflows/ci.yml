name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Setup Node (Linux)
        if: runner.os == 'Linux'
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          check-latest: true

      - name: Setup pnpm (latest)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: |
          JQ_VERSION="1.8.1"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: jq Version (Linux)
        if: runner.os == 'Linux'
        run: jq --version

      - name: pnpm Version (Linux)
        if: runner.os == 'Linux'
        run: pnpm --version

      - name: MoonBit Info
        if: runner.os == 'Linux'
        run: moon info

      - name: MoonBit Format Check
        if: runner.os == 'Linux'
        run: moon fmt --check

      - name: MoonBit Check
        run: moon check -d

      - name: MoonBit Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: moon test

      - name: MoonBit Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\\Installer\\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vs) { throw "Visual Studio with C++ tools not found." }
          $vcvars = Join-Path $vs "VC\\Auxiliary\\Build\\vcvars64.bat"
          cmd /c "`"$vcvars`" && moon test"

      - name: MoonBit JS Wrapper Test
        run: moon test --target js js

      - name: TS Packages (verify + type-aware lint)
        if: runner.os == 'Linux'
        run: bash ./scripts/ts_packages.sh verify --frozen-lockfile

      - name: Verify Imported Upstream Cases
        if: runner.os == 'Linux'
        run: |
          bash ./scripts/jq_upstream_import.sh
          git diff --exit-code -- scripts/jq_compat_cases.upstream.json

      - name: Differential Smoke (jq)
        if: runner.os == 'Linux'
        env:
          JQX_RUNNER: native
          JQX_PROFILE: release
        run: bash ./scripts/jq_diff.sh

      - name: Differential Upstream Full (jq)
        if: runner.os == 'Linux'
        env:
          JQX_RUNNER: native
          JQX_PROFILE: release
        run: bash ./scripts/jq_diff.sh scripts/jq_compat_cases.upstream.json

      - name: Differential Native Exit (jq)
        if: runner.os == 'Linux'
        env:
          JQX_PROFILE: release
        run: bash ./scripts/jq_diff_native.sh

      - name: Coverage Analyze (Linux)
        if: runner.os == 'Linux'
        run: |
          moon coverage analyze | tee uncovered.log

      - name: Coverage Summary (Linux)
        if: runner.os == 'Linux' && always()
        shell: bash
        run: |
          if [ ! -f uncovered.log ]; then
            {
              echo "### Moon Coverage Analyze (Linux)"
              echo
              echo '- `uncovered.log` was not generated because a previous step failed.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          {
            echo "### Moon Coverage Analyze (Linux)"
            echo
            echo "- Full text is printed in job logs by \`tee\`."
            echo "- Artifact contains \`uncovered.log\` (download is zipped by GitHub Actions)."
            echo
            echo "<details><summary>uncovered.log (first 200 lines)</summary>"
            echo
            echo '```text'
            sed -n '1,200p' uncovered.log
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Report (Linux)
        if: runner.os == 'Linux' && always() && hashFiles('uncovered.log') != ''
        uses: actions/upload-artifact@v7
        with:
          name: moon-coverage-uncovered-log
          path: uncovered.log
          if-no-files-found: ignore

  differential-smoke-matrix:
    name: Differential Smoke (${{ matrix.os }} / TZ=${{ matrix.tz }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        tz:
          - UTC
          - Asia/Tokyo
    env:
      TZ: ${{ matrix.tz }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: |
          JQ_VERSION="1.8.1"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: |
          JQ_VERSION="1.8.1"
          case "$(uname -m)" in
            arm64) JQ_ASSET="jq-macos-arm64" ;;
            x86_64) JQ_ASSET="jq-macos-amd64" ;;
            *)
              echo "Unsupported macOS architecture: $(uname -m)" >&2
              exit 2
              ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/${JQ_ASSET}" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $jqVersion = "1.8.1"
          $jqDir = Join-Path $HOME ".local\\bin"
          New-Item -ItemType Directory -Force -Path $jqDir | Out-Null
          $jqPath = Join-Path $jqDir "jq.exe"
          Invoke-WebRequest -Uri "https://github.com/jqlang/jq/releases/download/jq-$jqVersion/jq-windows-amd64.exe" -OutFile $jqPath
          $jqDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: jq Version
        run: jq --version

      - name: Differential TZ Smoke (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          JQX_RUNNER: native
          JQX_PROFILE: release
        run: bash ./scripts/jq_diff.sh scripts/jq_compat_cases.tz_matrix.json

      - name: Differential TZ Smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/jq_diff.ps1 -CasesPath scripts/jq_compat_cases.tz_matrix.json
