name: Release npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Run publish in dry-run mode"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      dry_run: ${{ steps.vars.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            DRY_RUN="${{ inputs.dry_run }}"
          else
            TAG="${GITHUB_REF_NAME}"
            DRY_RUN="false"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "::error::Tag must start with v. got=${TAG}"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: prepare
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm (latest)
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node (npm registry)
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          check-latest: true
          registry-url: "https://registry.npmjs.org"

      - name: Verify package versions match tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");
          const expected = process.env.RELEASE_VERSION;
          const dirs = execFileSync("node", ["./scripts/ts_packages.mjs", "list"], {
            encoding: "utf8",
          }).trim().split(/\r?\n/).filter(Boolean);
          for (const dir of dirs) {
            const pkg = JSON.parse(fs.readFileSync(`${dir}/package.json`, "utf8"));
            if (pkg.version !== expected) {
              console.error(`[version-mismatch] ${pkg.name}: package.json=${pkg.version}, tag=${expected}`);
              process.exit(1);
            }
          }
          console.log(`all package versions match tag v${expected}`);
          NODE

      - name: Verify TS packages
        shell: bash
        run: bash ./scripts/ts_packages.sh verify --frozen-lockfile

      - name: Publish to npm (or dry-run)
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t packages < <(node ./scripts/ts_packages.mjs list)

          if [ "${DRY_RUN}" != "true" ] && [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN is required for non-dry-run publish"
            exit 1
          fi

          for package_dir in "${packages[@]}"; do
            pushd "${package_dir}" >/dev/null
            package_name="$(node -p "require('./package.json').name")"
            package_version="$(node -p "require('./package.json').version")"
            package_ref="${package_name}@${package_version}"

            if npm view "${package_ref}" version >/dev/null 2>&1; then
              echo "skip: already published ${package_ref}"
              popd >/dev/null
              continue
            fi

            if [ "${DRY_RUN}" = "true" ]; then
              echo "dry-run publish ${package_ref}"
              pnpm publish --access public --dry-run --no-git-checks
            else
              echo "publish ${package_ref}"
              pnpm publish --access public --provenance --no-git-checks
            fi

            popd >/dev/null
          done
