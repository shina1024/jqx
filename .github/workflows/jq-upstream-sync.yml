name: Sync jq Upstream Fixtures

on:
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "jq upstream ref to sync (branch/tag/sha)"
        required: false
        default: "master"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Fixtures
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit Version
        run: moon version --all

      - name: Install jq
        run: |
          JQ_VERSION="1.8.1"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: jq Version
        run: jq --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update vendored jq tests and derived ledgers
        run: bash ./scripts/update_jq_tests.sh

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        id: create_pr
        if: steps.detect.outputs.changed == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/jq-upstream-sync
          delete-branch: true
          commit-message: "chore: sync jq upstream fixtures"
          title: "chore: sync jq upstream fixtures"
          body: |
            Automated sync of vendored jq upstream fixtures.

            - upstream ref: `${{ env.UPSTREAM_REF }}`
            - workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            third_party/jq-tests/**
            scripts/jq_compat_cases.upstream.json
            scripts/jq_upstream_failures.snapshot.json
            scripts/jq_upstream_diff_ledger.md

      - name: Report manual PR fallback
        if: steps.detect.outputs.changed == 'true' && steps.create_pr.outcome == 'failure'
        shell: bash
        run: |
          if git ls-remote --exit-code origin refs/heads/chore/jq-upstream-sync >/dev/null; then
            {
              echo "### Sync jq Upstream Fixtures"
              echo
              echo "GitHub Actions is not allowed to create pull requests in this repository."
              echo "The sync branch was pushed successfully and can be opened manually:"
              echo
              echo "- branch: \`chore/jq-upstream-sync\`"
              echo "- compare URL: ${{ github.server_url }}/${{ github.repository }}/compare/main...chore/jq-upstream-sync?expand=1"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "create-pull-request failed before pushing the sync branch" >&2
            exit 1
          fi

      - name: No changes
        if: steps.detect.outputs.changed != 'true'
        run: echo "No jq upstream fixture changes detected."
