name: Sync jq Upstream Fixtures

on:
  schedule:
    - cron: "20 3 * * 1"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "jq upstream ref to sync (branch/tag/sha)"
        required: false
        default: "master"
        type: string

permissions:
  contents: read

jobs:
  sync:
    name: Sync Fixtures
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || 'master' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit Version
        run: moon version --all

      - name: Install jq
        run: |
          JQ_VERSION="1.8.1"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: jq Version
        run: jq --version

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update vendored jq tests and derived ledgers
        run: bash ./scripts/update_jq_tests.sh

      - name: Detect changes
        id: detect
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.detect.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          branch: chore/jq-upstream-sync
          delete-branch: true
          commit-message: "chore: sync jq upstream fixtures"
          title: "chore: sync jq upstream fixtures"
          body: |
            Automated sync of vendored jq upstream fixtures.

            - upstream ref: `${{ env.UPSTREAM_REF }}`
            - workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          add-paths: |
            third_party/jq-tests/**
            scripts/jq_compat_cases.upstream.json
            scripts/jq_upstream_failures.snapshot.json
            scripts/jq_upstream_diff_ledger.md

      - name: No changes
        if: steps.detect.outputs.changed != 'true'
        run: echo "No jq upstream fixture changes detected."
