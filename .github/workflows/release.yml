name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Build and verify release artifacts without publishing"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      dry_run: ${{ steps.vars.outputs.dry_run }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
            dry_run="${INPUT_DRY_RUN}"
            prerelease="${INPUT_PRERELEASE}"
          else
            tag="${GITHUB_REF_NAME}"
            dry_run="false"
            prerelease="false"
          fi

          if [[ "${tag}" != v* ]]; then
            echo "::error::Tag must start with v. got=${tag}"
            exit 1
          fi

          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  cli:
    name: CLI artifacts
    needs: prepare
    permissions:
      contents: write
    uses: ./.github/workflows/release-cli.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      dry_run: ${{ needs.prepare.outputs.dry_run == 'true' }}
      prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}

  npm:
    name: npm packages
    needs: prepare
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/release-npm.yml
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      dry_run: ${{ needs.prepare.outputs.dry_run == 'true' }}

  mooncakes:
    name: Mooncakes module
    needs: prepare
    permissions:
      contents: read
    uses: ./.github/workflows/release-mooncakes.yml
    secrets:
      MOONCAKES_CREDENTIALS_JSON: ${{ secrets.MOONCAKES_CREDENTIALS_JSON }}
    with:
      tag: ${{ needs.prepare.outputs.tag }}
      dry_run: ${{ needs.prepare.outputs.dry_run == 'true' }}

  smoke:
    name: Post-release smoke
    if: ${{ needs.prepare.outputs.dry_run != 'true' }}
    needs:
      - prepare
      - cli
      - npm
      - mooncakes
    permissions:
      contents: read
    uses: ./.github/workflows/post-release-smoke.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
