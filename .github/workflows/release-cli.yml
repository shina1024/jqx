name: Release CLI

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string
      expected_commit:
        description: "Verified commit that the release tag must resolve to"
        required: true
        type: string
      dry_run:
        description: "Build and upload artifacts without publishing a GitHub Release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean
permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      dry_run: ${{ steps.vars.outputs.dry_run }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
      commit: ${{ steps.source.outputs.commit }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG}"
          DRY_RUN="${INPUT_DRY_RUN}"
          PRERELEASE="${INPUT_PRERELEASE}"

          if [[ "${TAG}" != v* ]]; then
            echo "::error::Tag must start with v. got=${TAG}"
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: refs/tags/${{ steps.vars.outputs.tag }}

      - name: Verify release commit
        id: source
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          release_commit="$(git rev-parse "refs/tags/${RELEASE_TAG}^{commit}")"
          if [ "${release_commit}" != "${EXPECTED_COMMIT}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} does not match the verified release commit."
            exit 1
          fi
          if ! git merge-base --is-ancestor "${release_commit}" refs/remotes/origin/main; then
            echo "::error::Release tag ${RELEASE_TAG} is not reachable from main."
            exit 1
          fi
          echo "commit=${release_commit}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout verified commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.commit }}

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Build and package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: |
          moon build --target native --release cmd
          CLI_BIN=""
          for candidate in \
            "_build/native/release/build/cmd/cmd" \
            "_build/native/release/build/cmd/cmd.exe"
          do
            if [ -f "${candidate}" ]; then
              CLI_BIN="${candidate}"
              break
            fi
          done

          if [ -z "${CLI_BIN}" ]; then
            echo "could not find release CLI binary" >&2
            find _build/native/release/build/cmd -maxdepth 1 -type f -print >&2
            exit 1
          fi

          chmod +x "${CLI_BIN}"
          CLI_SMOKE="$("${CLI_BIN}" "." "null")"
          if [ "${CLI_SMOKE}" != "null" ]; then
            echo "unexpected release smoke output: ${CLI_SMOKE}" >&2
            exit 1
          fi

          mkdir -p dist
          cp "${CLI_BIN}" "dist/jqx"
          chmod +x "dist/jqx"

          if [ "${RUNNER_OS}" = "Linux" ]; then
            ASSET="jqx-${TAG_NAME}-linux.tar.gz"
          else
            ASSET="jqx-${TAG_NAME}-macos.tar.gz"
          fi

          tar -C dist -czf "${ASSET}" jqx
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\\Installer\\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vs) { throw "Visual Studio with C++ tools not found." }
          $vcvars = Join-Path $vs "VC\\Auxiliary\\Build\\vcvars64.bat"
          cmd /c "`"$vcvars`" && moon build --target native --release cmd"

          $cliBin = "_build/native/release/build/cmd/cmd.exe"
          $cliSmoke = & $cliBin "." "null"
          if ($cliSmoke.Trim() -ne "null") {
            throw "unexpected release smoke output: $cliSmoke"
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $cliBin "dist/jqx.exe"
          $asset = "jqx-$env:TAG_NAME-windows.zip"
          Compress-Archive -Path "dist/jqx.exe" -DestinationPath $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cli-${{ runner.os }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    environment: release
    needs:
      - prepare
      - build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: cli-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          sha256sum jqx-* > SHA256SUMS

      - name: Publish GitHub Release
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_COMMIT: ${{ needs.prepare.outputs.commit }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          remote_commit="$(
            git ls-remote --refs "https://github.com/${GITHUB_REPOSITORY}.git" "refs/tags/${RELEASE_TAG}" |
              awk '{print $1}'
          )"
          if [ "${remote_commit}" != "${RELEASE_COMMIT}" ]; then
            echo "::error::Release tag ${RELEASE_TAG} changed after source verification."
            exit 1
          fi
          release_args=(--repo "${GITHUB_REPOSITORY}" --verify-tag --title "${RELEASE_TAG}" --generate-notes)
          if [ "${PRERELEASE}" = "true" ]; then
            release_args+=(--prerelease)
          fi
          gh release create "${RELEASE_TAG}" release-assets/* "${release_args[@]}"
