name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.1.0)"
        required: true
        type: string
      prerelease:
        description: "Mark release as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      prerelease: ${{ steps.vars.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Build and package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: |
          moon build --target native --release cmd
          CLI_BIN="_build/native/release/build/cmd/cmd"
          CLI_SMOKE="$("${CLI_BIN}" "." "null")"
          if [ "${CLI_SMOKE}" != "null" ]; then
            echo "unexpected release smoke output: ${CLI_SMOKE}" >&2
            exit 1
          fi

          mkdir -p dist
          cp "${CLI_BIN}" "dist/jqx"
          chmod +x "dist/jqx"

          if [ "${RUNNER_OS}" = "Linux" ]; then
            ASSET="jqx-${TAG_NAME}-linux.tar.gz"
          else
            ASSET="jqx-${TAG_NAME}-macos.tar.gz"
          fi

          tar -C dist -czf "${ASSET}" jqx
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag }}
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\\Installer\\vswhere.exe"
          $vs = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vs) { throw "Visual Studio with C++ tools not found." }
          $vcvars = Join-Path $vs "VC\\Auxiliary\\Build\\vcvars64.bat"
          cmd /c "`"$vcvars`" && moon build --target native --release cmd"

          $cliBin = "_build/native/release/build/cmd/cmd.exe"
          $cliSmoke = & $cliBin "." "null"
          if ($cliSmoke.Trim() -ne "null") {
            throw "unexpected release smoke output: $cliSmoke"
          }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item $cliBin "dist/jqx.exe"
          $asset = "jqx-$env:TAG_NAME-windows.zip"
          Compress-Archive -Path "dist/jqx.exe" -DestinationPath $asset -Force
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ runner.os }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
