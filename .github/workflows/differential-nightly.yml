name: Differential Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  differential-full:
    name: Differential Full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Install jq (latest)
        uses: ./.github/actions/install-jq

      - name: jq Version
        run: jq --version

      - name: Differential Upstream Full (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ./scripts/jq_diff.sh scripts/jq_compat_cases.upstream.json

      - name: Differential Upstream Full (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/jq_diff.ps1 -CasesPath scripts/jq_compat_cases.upstream.json

      - name: Differential Native Exit (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          JQX_PROFILE: release
        run: bash ./scripts/jq_diff.sh scripts/jq_exit_cases.json

      - name: Differential Native Exit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/jq_diff.ps1 -CasesPath scripts/jq_exit_cases.json

  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs:
      - differential-full
    if: always()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Report failure to issue
        if: needs.differential-full.result != 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI] Differential Nightly failed";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Differential Nightly failed.",
              "",
              `- workflow: ${context.workflow}`,
              `- run: ${runUrl}`,
              `- sha: ${context.sha}`,
              `- triggered: ${context.eventName}`,
              "",
              "Please inspect failed jobs and update this issue when resolved."
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close failure issue after recovery
        if: needs.differential-full.result == 'success'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI] Differential Nightly failed";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (!existing) {
              core.info("No open nightly failure issue to close.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: [
                "Differential Nightly recovered.",
                "",
                `- run: ${runUrl}`,
                `- sha: ${context.sha}`,
              ].join("\n"),
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed",
            });
