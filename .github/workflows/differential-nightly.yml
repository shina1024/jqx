name: Differential Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  differential-full:
    name: Differential Full (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install MoonBit (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$HOME\\.moon\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: MoonBit Version
        run: moon version --all

      - name: Install jq (Linux)
        if: runner.os == 'Linux'
        run: |
          JQ_VERSION="1.8.1"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-amd64" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: |
          JQ_VERSION="1.8.1"
          case "$(uname -m)" in
            arm64) JQ_ASSET="jq-macos-arm64" ;;
            x86_64) JQ_ASSET="jq-macos-amd64" ;;
            *)
              echo "Unsupported macOS architecture: $(uname -m)" >&2
              exit 2
              ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/${JQ_ASSET}" -o "$HOME/.local/bin/jq"
          chmod +x "$HOME/.local/bin/jq"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $jqVersion = "1.8.1"
          $jqDir = Join-Path $HOME ".local\\bin"
          New-Item -ItemType Directory -Force -Path $jqDir | Out-Null
          $jqPath = Join-Path $jqDir "jq.exe"
          Invoke-WebRequest -Uri "https://github.com/jqlang/jq/releases/download/jq-$jqVersion/jq-windows-amd64.exe" -OutFile $jqPath
          $jqDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: jq Version
        run: jq --version

      - name: Differential Upstream Full (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ./scripts/jq_diff.sh scripts/jq_compat_cases.upstream.json

      - name: Differential Upstream Full (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/jq_diff.ps1 -CasesPath scripts/jq_compat_cases.upstream.json

      - name: Differential Native Exit (Linux/macOS)
        if: runner.os != 'Windows'
        run: bash ./scripts/jq_diff_native.sh

      - name: Differential Native Exit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/jq_diff_native.ps1

  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs:
      - differential-full
    if: always()
    permissions:
      issues: write
      contents: read
    steps:
      - name: Report failure to issue
        if: needs.differential-full.result != 'success'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI] Differential Nightly failed";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "Differential Nightly failed.",
              "",
              `- workflow: ${context.workflow}`,
              `- run: ${runUrl}`,
              `- sha: ${context.sha}`,
              `- triggered: ${context.eventName}`,
              "",
              "Please inspect failed jobs and update this issue when resolved."
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }

      - name: Close failure issue after recovery
        if: needs.differential-full.result == 'success'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "[CI] Differential Nightly failed";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => !issue.pull_request && issue.title === title,
            );

            if (!existing) {
              core.info("No open nightly failure issue to close.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: existing.number,
              body: [
                "Differential Nightly recovered.",
                "",
                `- run: ${runUrl}`,
                `- sha: ${context.sha}`,
              ].join("\n"),
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: existing.number,
              state: "closed",
            });
