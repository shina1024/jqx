name: Release Mooncakes

on:
  workflow_call:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Run publish in dry-run mode"
        required: false
        default: false
        type: boolean
    secrets:
      MOONCAKES_CREDENTIALS_JSON:
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Run publish in dry-run mode"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      version: ${{ steps.vars.outputs.version }}
      dry_run: ${{ steps.vars.outputs.dry_run }}
    steps:
      - name: Resolve release metadata
        id: vars
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ] || [ "${EVENT_NAME}" = "workflow_call" ]; then
            TAG="${INPUT_TAG}"
            DRY_RUN="${INPUT_DRY_RUN}"
          else
            TAG="${GITHUB_REF_NAME}"
            DRY_RUN="false"
          fi

          if [[ "${TAG}" != v* ]]; then
            echo "::error::Tag must start with v. got=${TAG}"
            exit 1
          fi

          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish Mooncakes module
    runs-on: ubuntu-latest
    needs: prepare
    concurrency:
      group: release-mooncakes-${{ needs.prepare.outputs.tag }}
      cancel-in-progress: false
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: refs/tags/${{ needs.prepare.outputs.tag }}

      - name: Install MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit Version
        run: moon version --all

      - name: Verify module version matches tag
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const expected = process.env.RELEASE_VERSION;
          const modText = fs.readFileSync("moon.mod", "utf8");
          const readMoonModField = (name) => {
            const match = modText.match(new RegExp(`^${name}\\s*=\\s*"([^"]+)"`, "m"));
            if (!match) {
              console.error(`[moon-mod-field-missing] ${name}`);
              process.exit(1);
            }
            return match[1];
          };
          const mod = {
            name: readMoonModField("name"),
            version: readMoonModField("version"),
          };
          if (mod.version !== expected) {
            console.error(`[version-mismatch] ${mod.name}: moon.mod=${mod.version}, tag=${expected}`);
            process.exit(1);
          }
          console.log(`module version matches tag v${expected}`);
          NODE

      - name: Verify MoonBit package
        shell: bash
        run: |
          moon info
          moon fmt --check
          moon check --warn-list +73
          moon test
          moon package --frozen --list

      - name: Check Mooncakes registry state
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          module_name="$(
            node <<'NODE'
            const fs = require("fs");
            const text = fs.readFileSync("moon.mod", "utf8");
            const match = text.match(/^name\s*=\s*"([^"]+)"/m);
            if (!match) {
              console.error("[moon-mod-field-missing] name");
              process.exit(1);
            }
            console.log(match[1]);
          NODE
          )"
          module_url="https://mooncakes.io/api/v0/modules/${module_name}"
          mkdir -p release-audit

          if curl -fsSL "${module_url}" -o release-audit/mooncakes-module.json; then
            published="$(
              node -e 'const fs = require("fs"); const version = process.env.RELEASE_VERSION; const data = JSON.parse(fs.readFileSync("release-audit/mooncakes-module.json", "utf8")); const versions = Array.isArray(data.versions) ? data.versions : []; console.log(versions.some((entry) => entry.version === version) ? "true" : "false");'
            )"
          else
            published="false"
            printf '{"module":"%s","versions":[]}\n' "${module_name}" > release-audit/mooncakes-module.json
          fi

          {
            echo "# Mooncakes release audit"
            echo
            echo "- Tag: \`${RELEASE_TAG}\`"
            echo "- Version: \`${RELEASE_VERSION}\`"
            echo "- Module: \`${module_name}\`"
            echo "- Dry run: \`${DRY_RUN}\`"
            echo "- Already published: \`${published}\`"
          } > release-audit/mooncakes-release-audit.md

          cat release-audit/mooncakes-release-audit.md >> "$GITHUB_STEP_SUMMARY"
          echo "module=${module_name}" >> "$GITHUB_OUTPUT"
          echo "already_published=${published}" >> "$GITHUB_OUTPUT"

      - name: Upload Mooncakes release audit artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mooncakes-release-audit-${{ needs.prepare.outputs.tag }}
          path: |
            release-audit/mooncakes-release-audit.md
            release-audit/mooncakes-module.json
          if-no-files-found: error

      - name: Validate Mooncakes credentials
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        shell: bash
        env:
          MOONCAKES_CREDENTIALS_JSON: ${{ secrets.MOONCAKES_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${MOONCAKES_CREDENTIALS_JSON:-}" ]; then
            echo "::error::MOONCAKES_CREDENTIALS_JSON is required for non-dry-run publish"
            exit 1
          fi

          mkdir -p "$HOME/.moon"
          credentials="$HOME/.moon/credentials.json"
          cleanup() {
            rm -f "${credentials}"
          }
          trap cleanup EXIT

          printf '%s' "${MOONCAKES_CREDENTIALS_JSON}" > "${credentials}"
          chmod 600 "${credentials}"
          moon whoami

      - name: Publish to Mooncakes (or dry-run)
        shell: bash
        env:
          ALREADY_PUBLISHED: ${{ steps.registry.outputs.already_published }}
          MODULE_NAME: ${{ steps.registry.outputs.module }}
          MOONCAKES_CREDENTIALS_JSON: ${{ secrets.MOONCAKES_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          if [ "${DRY_RUN}" = "true" ]; then
            echo "dry-run publish ${RELEASE_TAG}"
            if [ -z "${MOONCAKES_CREDENTIALS_JSON:-}" ]; then
              echo "::error::MOONCAKES_CREDENTIALS_JSON is required for dry-run publish"
              exit 1
            fi

            mkdir -p "$HOME/.moon"
            credentials="$HOME/.moon/credentials.json"
            cleanup() {
              rm -f "${credentials}"
            }
            trap cleanup EXIT

            printf '%s' "${MOONCAKES_CREDENTIALS_JSON}" > "${credentials}"
            chmod 600 "${credentials}"

            if ! output="$(moon publish --frozen --dry-run 2>&1)"; then
              printf '%s\n' "${output}"
              if ! grep -q "Dry run completed successfully" <<<"${output}"; then
                exit 1
              fi
              exit 0
            fi
            printf '%s\n' "${output}"
            exit 0
          fi

          if [ "${ALREADY_PUBLISHED}" = "true" ]; then
            echo "skip: already published ${MODULE_NAME}@${RELEASE_VERSION}"
            exit 0
          fi

          if [ -z "${MOONCAKES_CREDENTIALS_JSON:-}" ]; then
            echo "::error::MOONCAKES_CREDENTIALS_JSON is required for non-dry-run publish"
            exit 1
          fi

          mkdir -p "$HOME/.moon"
          credentials="$HOME/.moon/credentials.json"
          cleanup() {
            rm -f "${credentials}"
          }
          trap cleanup EXIT

          printf '%s' "${MOONCAKES_CREDENTIALS_JSON}" > "${credentials}"
          chmod 600 "${credentials}"

          moon whoami
          moon publish --frozen
