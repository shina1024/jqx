name: Migrate release secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migrate:
    name: Move repository secrets to release environment
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Migrate secrets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_MIGRATION_TOKEN }}
          REPOSITORY_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          REPOSITORY_MOONCAKES_CREDENTIALS_JSON: ${{ secrets.MOONCAKES_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ] || [ -z "${REPOSITORY_NPM_TOKEN:-}" ] ||
            [ -z "${REPOSITORY_MOONCAKES_CREDENTIALS_JSON:-}" ]; then
            echo "::error::Migration inputs are incomplete."
            exit 1
          fi
          printf '%s' "${REPOSITORY_NPM_TOKEN}" |
            gh secret set NPM_TOKEN --env release --repo "${GITHUB_REPOSITORY}"
          printf '%s' "${REPOSITORY_MOONCAKES_CREDENTIALS_JSON}" |
            gh secret set MOONCAKES_CREDENTIALS_JSON --env release --repo "${GITHUB_REPOSITORY}"
